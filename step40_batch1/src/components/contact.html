    <!-- CONTACT -->
    <div class="page" id="page-contact">
      <div class="content">
        <div class="section-header">
          <span class="section-title">Contact</span>
        </div>
        <div class="contact-grid">
          <div>
            <p class="contact-intro" data-editable="contact_intro" style="outline: none; cursor: text; border-bottom: 1px dashed rgba(245, 208, 0, 0.5);" contenteditable="true">Tell me why I'm wrong!</p>
            <p data-editable="contact_sub" style="font-size: 0.875rem; color: var(--gray-600); line-height: 1.6; outline: none; cursor: text; border-bottom: 1px dashed rgba(245, 208, 0, 0.5);" contenteditable="true">Tell me how smart and cool you think I am</p>
          </div>
          <form class="contact-form" onsubmit="handleContact(event)">
            <div class="form-group">
              <label class="form-label" for="contact-name">Name</label><input id="contact-name" name="name" placeholder="Your name" required="" type="text" maxlength="100">
            </div>
            <div class="form-group">
              <label class="form-label" for="contact-email">Email</label><input id="contact-email" name="email" placeholder="your@email.com" required="" type="email" maxlength="254">
            </div>
            <div class="form-group">
              <label class="form-label" for="contact-subject">Subject</label>
              <select id="contact-subject" name="subject">
                <option>General</option>
                <option>Disagree with a ranking</option>
                <option>Suggest an addition</option>
                <option>Other</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="contact-message">Message</label><textarea id="contact-message" name="message" placeholder="Say something..." required="" maxlength="10000"></textarea>
            </div>
            <div id="contact-status" role="status" aria-live="polite" style="display: none; font-size: 0.84rem; line-height: 1.5"></div>
            <button class="contact-submit" type="submit">Send</button>
          </form>
        </div>
      </div>
    </div>
